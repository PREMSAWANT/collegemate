{% extends "base.html" %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
    <!-- Background Blobs -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-10 right-10 w-72 h-72 bg-purple-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
        <div class="absolute bottom-10 left-10 w-72 h-72 bg-yellow-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
        <div class="absolute top-1/2 left-1/2 w-72 h-72 bg-pink-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-4000"></div>
    </div>

    <div class="max-w-md w-full space-y-8 glass-card p-8 sm:p-10 relative z-10" data-aos="fade-up">
        <div class="text-center">
            <div class="mx-auto h-24 w-24 bg-gradient-to-tr from-pink-500 to-orange-500 rounded-full flex items-center justify-center shadow-lg mb-6 transform hover:scale-110 transition-transform duration-300">
                <i class="fas fa-user-plus text-4xl text-white"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">
                Join the Community
            </h2>
            <p class="mt-2 text-sm text-slate-600 dark:text-slate-400">
                Create your account to get started
            </p>
        </div>
        
        {% if error %}
        <div class="bg-red-50 dark:bg-red-900/30 border-l-4 border-red-400 p-4 rounded-r-md animate-pulse">
            <div class="flex">
                <div class="flex-shrink-0">
                    <i class="fas fa-exclamation-circle text-red-400"></i>
                </div>
                <div class="ml-3">
                    <p class="text-sm text-red-700 dark:text-red-200 font-medium">{{ error }}</p>
                </div>
            </div>
        </div>
        {% endif %}

        <form class="mt-8 space-y-6" action="{{ url_for('register') }}" method="POST" onsubmit="return validateForm()">
            <div class="space-y-4">
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-id-card text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
                    </div>
                    <input id="fullname" name="fullname" type="text" required 
                        class="appearance-none block w-full pl-10 pr-3 py-3 border border-slate-300 dark:border-slate-600 rounded-lg leading-5 bg-white/50 dark:bg-slate-700/50 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white dark:focus:bg-slate-700 sm:text-sm transition-all duration-200 dark:text-white" 
                        placeholder="Full Name">
                </div>
                
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-user text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
                    </div>
                    <input id="username" name="username" type="text" required 
                        class="appearance-none block w-full pl-10 pr-3 py-3 border border-slate-300 dark:border-slate-600 rounded-lg leading-5 bg-white/50 dark:bg-slate-700/50 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white dark:focus:bg-slate-700 sm:text-sm transition-all duration-200 dark:text-white" 
                        placeholder="Username">
                </div>

                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-envelope text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
                    </div>
                    <input id="email" name="email" type="email" required 
                        class="appearance-none block w-full pl-10 pr-3 py-3 border border-slate-300 dark:border-slate-600 rounded-lg leading-5 bg-white/50 dark:bg-slate-700/50 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white dark:focus:bg-slate-700 sm:text-sm transition-all duration-200 dark:text-white" 
                        placeholder="Email address">
                </div>

                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-phone text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
                    </div>
                    <input id="phone" name="phone" type="tel" required 
                        class="appearance-none block w-full pl-10 pr-3 py-3 border border-slate-300 dark:border-slate-600 rounded-lg leading-5 bg-white/50 dark:bg-slate-700/50 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white dark:focus:bg-slate-700 sm:text-sm transition-all duration-200 dark:text-white" 
                        placeholder="Phone Number">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="relative group">
                         <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user-tag text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
                        </div>
                        <select id="user_type" name="user_type" onchange="toggleStudentFields()" class="appearance-none block w-full pl-10 pr-3 py-3 border border-slate-300 dark:border-slate-600 rounded-lg leading-5 bg-white/50 dark:bg-slate-700/50 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white dark:focus:bg-slate-700 sm:text-sm transition-all duration-200">
                            <option value="student">Student</option>
                            <option value="faculty">Faculty</option>
                            <option value="parent">Parent</option>
                        </select>
                    </div>
                    
                    <div id="year_field" class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-graduation-cap text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
                        </div>
                        <select id="year" name="year" class="appearance-none block w-full pl-10 pr-3 py-3 border border-slate-300 dark:border-slate-600 rounded-lg leading-5 bg-white/50 dark:bg-slate-700/50 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white dark:focus:bg-slate-700 sm:text-sm transition-all duration-200">
                            <option value="" disabled selected>Year</option>
                            <option value="FE">FE</option>
                            <option value="SE">SE</option>
                            <option value="TE">TE</option>
                            <option value="BE">BE</option>
                        </select>
                    </div>
                </div>

                <div id="dept_field" class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-building text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
                    </div>
                    <select id="department" name="department" class="appearance-none block w-full pl-10 pr-3 py-3 border border-slate-300 dark:border-slate-600 rounded-lg leading-5 bg-white/50 dark:bg-slate-700/50 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white dark:focus:bg-slate-700 sm:text-sm transition-all duration-200">
                        <option value="" disabled selected>Select Department</option>
                        {% for dept in college_info.departments %}
                        <option value="{{ dept }}">{{ dept }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
                    </div>
                    <input id="password" name="password" type="password" required 
                        class="appearance-none block w-full pl-10 pr-3 py-3 border border-slate-300 dark:border-slate-600 rounded-lg leading-5 bg-white/50 dark:bg-slate-700/50 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white dark:focus:bg-slate-700 sm:text-sm transition-all duration-200 dark:text-white" 
                        placeholder="Password">
                </div>

                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
                    </div>
                    <input id="confirm_password" name="confirm_password" type="password" required 
                        class="appearance-none block w-full pl-10 pr-3 py-3 border border-slate-300 dark:border-slate-600 rounded-lg leading-5 bg-white/50 dark:bg-slate-700/50 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white dark:focus:bg-slate-700 sm:text-sm transition-all duration-200 dark:text-white" 
                        placeholder="Confirm Password">
                </div>
            </div>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-lg text-white bg-gradient-to-r from-pink-500 to-orange-500 hover:from-pink-600 hover:to-orange-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-pink-500 transform transition-all duration-200 hover:scale-[1.02] shadow-lg hover:shadow-xl">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fas fa-user-plus text-pink-200 group-hover:text-white transition-colors"></i>
                    </span>
                    Register
                </button>
            </div>
            
            <div class="text-center mt-4">
                <p class="text-sm text-slate-600 dark:text-slate-400">
                    Already have an account? 
                    <a href="{{ url_for('login') }}" class="font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-orange-500 hover:from-pink-600 hover:to-orange-600 transition-all">
                        Sign in here
                    </a>
                </p>
            </div>
        </form>
    </div>
</div>

<script>
    function toggleStudentFields() {
        var userType = document.getElementById("user_type").value;
        var deptField = document.getElementById("dept_field");
        var yearField = document.getElementById("year_field");
        
        if (userType === "student") {
            deptField.style.display = "block";
            yearField.style.display = "block";
            document.getElementById("department").required = true;
            document.getElementById("year").required = true;
        } else {
            deptField.style.display = "none";
            yearField.style.display = "none";
            document.getElementById("department").required = false;
            document.getElementById("year").required = false;
        }
    }

    function validateForm() {
        var password = document.getElementById("password").value;
        var confirmPassword = document.getElementById("confirm_password").value;
        
        if (password != confirmPassword) {
            alert("Passwords do not match!");
            return false;
        }
        return true;
    }

    // Initialize fields on load
    window.onload = toggleStudentFields;
</script>

<style>
    .animate-blob {
        animation: blob 7s infinite;
    }
    .animation-delay-2000 {
        animation-delay: 2s;
    }
    .animation-delay-4000 {
        animation-delay: 4s;
    }
    @keyframes blob {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
        100% { transform: translate(0px, 0px) scale(1); }
    }
</style>
{% endblock %}
