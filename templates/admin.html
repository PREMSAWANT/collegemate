{% extends "base.html" %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 transition-colors duration-300 bg-slate-50 dark:bg-slate-900 min-h-screen">
    <div class="md:flex md:items-center md:justify-between mb-8">
        <div class="flex-1 min-w-0">
            <h2 class="text-2xl font-bold leading-7 text-slate-900 sm:text-3xl sm:truncate">
                Admin Dashboard
            </h2>
        </div>
        <div class="mt-4 flex md:mt-0 md:ml-4 space-x-3">
            <a href="{{ url_for('admin_settings') }}" class="inline-flex items-center px-4 py-2 border border-slate-300 rounded-md shadow-sm text-sm font-medium text-slate-700 bg-white hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                <i class="fas fa-cog mr-2"></i> Settings
            </a>
            <a href="{{ url_for('database_view') }}" class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                View Database
            </a>
        </div>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-4 mb-12" id="stats-container">
        <!-- Stats will be loaded via JS -->
    </div>

    <!-- Charts Section -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12" data-aos="fade-up">
        <div class="glass-card p-8">
            <h3 class="text-xl font-bold text-slate-800 dark:text-white mb-6">Admission Trends (2024)</h3>
            <canvas id="admissionChart" height="200"></canvas>
        </div>
        <div class="glass-card p-8">
            <h3 class="text-xl font-bold text-slate-800 dark:text-white mb-6">Applications by Department</h3>
            <canvas id="deptChart" height="200"></canvas>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- Recent Conversations -->
        <div class="bg-white shadow rounded-lg p-6">
            <h3 class="text-lg leading-6 font-medium text-slate-900 mb-4">Recent Conversations</h3>
            <div class="flow-root">
                <ul id="conversations-list" class="-my-5 divide-y divide-slate-200">
                    <!-- Loaded via JS -->
                </ul>
            </div>
        </div>

        <!-- Recent Admissions -->
        <div class="bg-white shadow rounded-lg p-6">
            <h3 class="text-lg leading-6 font-medium text-slate-900 mb-4">Recent Admissions</h3>
            <div class="flow-root">
                <ul id="admissions-list" class="-my-5 divide-y divide-slate-200">
                    <!-- Loaded via JS -->
                </ul>
            </div>
        </div>
    </div>
</div>

<script>
    // Fetch Stats
    fetch('/api/admin/stats')
        .then(response => response.json())
        .then(data => {
            const statsContainer = document.getElementById('stats-container');
            const stats = [
                { title: 'Total Visitors', value: data.visitors, icon: 'fa-users', color: 'indigo' },
                { title: 'New Admissions', value: data.admissions, icon: 'fa-user-graduate', color: 'green' },
                { title: 'Pending Grievances', value: data.grievances, icon: 'fa-exclamation-circle', color: 'red' },
                { title: 'Upcoming Events', value: data.events, icon: 'fa-calendar-star', color: 'blue' }
            ];

            statsContainer.innerHTML = stats.map(stat => `
                <div class="glass-card p-6 border-l-4 border-${stat.color}-500 transform hover:scale-105 transition-all">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-${stat.color}-100 dark:bg-${stat.color}-900/30 p-3 rounded-xl text-${stat.color}-600">
                            <i class="fas ${stat.icon} text-xl"></i>
                        </div>
                        <div class="ml-5">
                            <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">${stat.title}</p>
                            <h4 class="text-3xl font-black text-slate-900 dark:text-white">${stat.value}</h4>
                        </div>
                    </div>
                </div>
            `).join('');

            initCharts();
        });

    function initCharts() {
        // Admission Trends Chart
        const ctx1 = document.getElementById('admissionChart').getContext('2d');
        new Chart(ctx1, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Applications',
                    data: [65, 59, 80, 81, 56, 95],
                    borderColor: '#6366f1',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(99, 102, 241, 0.1)'
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true } }
            }
        });

        // Department Chart
        const ctx2 = document.getElementById('deptChart').getContext('2d');
        new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['CSE', 'MECH', 'EXTC', 'CIVIL'],
                datasets: [{
                    data: [45, 25, 20, 10],
                    backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ef4444']
                }]
            },
            options: {
                plugins: { legend: { position: 'bottom' } }
            }
        });
    }

    // Fetch Conversations
    fetch('/api/admin/conversations')
        .then(response => response.json())
        .then(data => {
            const list = document.getElementById('conversations-list');
            list.innerHTML = data.slice(0, 5).map(conv => `
                <li class="py-4">
                    <div class="flex items-center space-x-4">
                        <div class="flex-shrink-0">
                            <span class="inline-block h-8 w-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center">
                                <i class="fas fa-user"></i>
                            </span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-slate-900 truncate">
                                ${conv.student_name || 'Unknown User'}
                            </p>
                            <p class="text-sm text-slate-500 truncate">
                                ${conv.phone_number}
                            </p>
                        </div>
                        <div class="inline-flex items-center text-xs text-slate-500">
                            ${new Date(conv.timestamp).toLocaleTimeString()}
                        </div>
                    </div>
                </li>
            `).join('');
        });

    // Fetch Admissions
    fetch('/api/admin/admissions')
        .then(response => response.json())
        .then(data => {
            const list = document.getElementById('admissions-list');
            list.innerHTML = data.slice(0, 5).map(adm => `
                <li class="py-4">
                    <div class="flex items-center space-x-4">
                        <div class="flex-shrink-0">
                            <span class="inline-block h-8 w-8 rounded-full bg-green-100 text-green-600 flex items-center justify-center">
                                <i class="fas fa-check"></i>
                            </span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-slate-900 truncate">
                                ${adm.student_name}
                            </p>
                            <p class="text-sm text-slate-500 truncate">
                                ${adm.course_name}
                            </p>
                        </div>
                        <div class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                            ${adm.admission_status}
                        </div>
                    </div>
                </li>
            `).join('');
        });
</script>
{% endblock %}
