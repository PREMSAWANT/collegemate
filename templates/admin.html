{% extends "base.html" %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="md:flex md:items-center md:justify-between mb-8">
        <div class="flex-1 min-w-0">
            <h2 class="text-2xl font-bold leading-7 text-slate-900 sm:text-3xl sm:truncate">
                Admin Dashboard
            </h2>
        </div>
        <div class="mt-4 flex md:mt-0 md:ml-4">
            <a href="{{ url_for('database_view') }}" class="ml-3 inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                View Database
            </a>
        </div>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-4 mb-8" id="stats-container">
        <!-- Stats will be loaded via JS -->
        <div class="bg-white overflow-hidden shadow rounded-lg animate-pulse">
            <div class="p-5">
                <div class="h-6 bg-slate-200 rounded w-1/2 mb-4"></div>
                <div class="h-10 bg-slate-200 rounded w-1/4"></div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- Recent Conversations -->
        <div class="bg-white shadow rounded-lg p-6">
            <h3 class="text-lg leading-6 font-medium text-slate-900 mb-4">Recent Conversations</h3>
            <div class="flow-root">
                <ul id="conversations-list" class="-my-5 divide-y divide-slate-200">
                    <!-- Loaded via JS -->
                </ul>
            </div>
        </div>

        <!-- Recent Admissions -->
        <div class="bg-white shadow rounded-lg p-6">
            <h3 class="text-lg leading-6 font-medium text-slate-900 mb-4">Recent Admissions</h3>
            <div class="flow-root">
                <ul id="admissions-list" class="-my-5 divide-y divide-slate-200">
                    <!-- Loaded via JS -->
                </ul>
            </div>
        </div>
    </div>
</div>

<script>
    // Fetch Stats
    fetch('/api/admin/stats')
        .then(response => response.json())
        .then(data => {
            const statsContainer = document.getElementById('stats-container');
            statsContainer.innerHTML = `
                <div class="bg-white overflow-hidden shadow rounded-lg">
                    <div class="p-5">
                        <div class="flex items-center">
                            <div class="flex-shrink-0 bg-indigo-500 rounded-md p-3">
                                <i class="fas fa-users text-white text-xl"></i>
                            </div>
                            <div class="ml-5 w-0 flex-1">
                                <dl>
                                    <dt class="text-sm font-medium text-slate-500 truncate">Total Visitors Today</dt>
                                    <dd class="text-3xl font-semibold text-slate-900">${data.visitors}</dd>
                                </dl>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-white overflow-hidden shadow rounded-lg">
                    <div class="p-5">
                        <div class="flex items-center">
                            <div class="flex-shrink-0 bg-green-500 rounded-md p-3">
                                <i class="fas fa-comments text-white text-xl"></i>
                            </div>
                            <div class="ml-5 w-0 flex-1">
                                <dl>
                                    <dt class="text-sm font-medium text-slate-500 truncate">Active Conversations</dt>
                                    <dd class="text-3xl font-semibold text-slate-900">${data.conversations}</dd>
                                </dl>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-white overflow-hidden shadow rounded-lg">
                    <div class="p-5">
                        <div class="flex items-center">
                            <div class="flex-shrink-0 bg-yellow-500 rounded-md p-3">
                                <i class="fas fa-user-graduate text-white text-xl"></i>
                            </div>
                            <div class="ml-5 w-0 flex-1">
                                <dl>
                                    <dt class="text-sm font-medium text-slate-500 truncate">New Admissions</dt>
                                    <dd class="text-3xl font-semibold text-slate-900">${data.admissions}</dd>
                                </dl>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-white overflow-hidden shadow rounded-lg">
                    <div class="p-5">
                        <div class="flex items-center">
                            <div class="flex-shrink-0 bg-blue-500 rounded-md p-3">
                                <i class="fas fa-robot text-white text-xl"></i>
                            </div>
                            <div class="ml-5 w-0 flex-1">
                                <dl>
                                    <dt class="text-sm font-medium text-slate-500 truncate">AI Response Rate</dt>
                                    <dd class="text-3xl font-semibold text-slate-900">${data.response_rate}%</dd>
                                </dl>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

    // Fetch Conversations
    fetch('/api/admin/conversations')
        .then(response => response.json())
        .then(data => {
            const list = document.getElementById('conversations-list');
            list.innerHTML = data.slice(0, 5).map(conv => `
                <li class="py-4">
                    <div class="flex items-center space-x-4">
                        <div class="flex-shrink-0">
                            <span class="inline-block h-8 w-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center">
                                <i class="fas fa-user"></i>
                            </span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-slate-900 truncate">
                                ${conv.student_name || 'Unknown User'}
                            </p>
                            <p class="text-sm text-slate-500 truncate">
                                ${conv.phone_number}
                            </p>
                        </div>
                        <div class="inline-flex items-center text-xs text-slate-500">
                            ${new Date(conv.timestamp).toLocaleTimeString()}
                        </div>
                    </div>
                </li>
            `).join('');
        });

    // Fetch Admissions
    fetch('/api/admin/admissions')
        .then(response => response.json())
        .then(data => {
            const list = document.getElementById('admissions-list');
            list.innerHTML = data.slice(0, 5).map(adm => `
                <li class="py-4">
                    <div class="flex items-center space-x-4">
                        <div class="flex-shrink-0">
                            <span class="inline-block h-8 w-8 rounded-full bg-green-100 text-green-600 flex items-center justify-center">
                                <i class="fas fa-check"></i>
                            </span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-slate-900 truncate">
                                ${adm.student_name}
                            </p>
                            <p class="text-sm text-slate-500 truncate">
                                ${adm.course_name}
                            </p>
                        </div>
                        <div class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                            ${adm.admission_status}
                        </div>
                    </div>
                </li>
            `).join('');
        });
</script>
{% endblock %}
