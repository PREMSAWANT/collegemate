{% extends "base.html" %}

{% block content %}
<div class="bg-slate-50 py-16 px-4 sm:px-6 lg:px-8">
    <div class="max-w-7xl mx-auto">
        <div class="text-center">
            <h2 class="text-3xl font-extrabold tracking-tight text-slate-900 sm:text-4xl">
                Contact Us
            </h2>
            <p class="mt-4 text-lg leading-6 text-slate-500">
                We'd love to hear from you. Get in touch with us for any queries.
            </p>
        </div>
        <div class="mt-12 grid grid-cols-1 gap-8 sm:grid-cols-2">
            <!-- Contact Info -->
            <div class="bg-white rounded-lg shadow-lg overflow-hidden">
                <div class="p-6">
                    <h3 class="text-lg font-medium text-slate-900">Contact Information</h3>
                    <div class="mt-6 space-y-6">
                        <div class="flex items-center">
                            <i class="fas fa-map-marker-alt text-indigo-500 text-xl w-8"></i>
                            <span class="ml-3 text-slate-500">{{ college_info.address }}</span>
                        </div>
                        <div class="flex items-center">
                            <i class="fas fa-phone text-indigo-500 text-xl w-8"></i>
                            <span class="ml-3 text-slate-500">{{ college_info.phone }}</span>
                        </div>
                        <div class="flex items-center">
                            <i class="fas fa-envelope text-indigo-500 text-xl w-8"></i>
                            <span class="ml-3 text-slate-500">{{ college_info.email }}</span>
                        </div>
                    </div>
                    
                    <div class="mt-8">
                        <h3 class="text-lg font-medium text-slate-900 mb-4">Location</h3>
                        <div class="aspect-w-16 aspect-h-9 bg-slate-200 rounded-lg">
                            <!-- Placeholder for map -->
                            <div class="flex items-center justify-center h-48 bg-slate-100 rounded-lg">
                                <p class="text-slate-500">Map Integration Here</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="bg-white rounded-lg shadow-lg overflow-hidden">
                <div class="p-6">
                    <h3 class="text-lg font-medium text-slate-900">Send us a message</h3>
                    <form action="{{ url_for('contact') }}" method="POST" class="mt-6 space-y-6">
                        <div>
                            <label for="name" class="block text-sm font-medium text-slate-700">Name</label>
                            <input type="text" name="name" id="name" required class="mt-1 block w-full border border-slate-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        </div>
                        <div>
                            <label for="email" class="block text-sm font-medium text-slate-700">Email</label>
                            <input type="email" name="email" id="email" required class="mt-1 block w-full border border-slate-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        </div>
                        <div>
                            <label for="phone" class="block text-sm font-medium text-slate-700">Phone</label>
                            <input type="tel" name="phone" id="phone" class="mt-1 block w-full border border-slate-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        </div>
                        <div>
                            <label for="subject" class="block text-sm font-medium text-slate-700">Subject</label>
                            <input type="text" name="subject" id="subject" required class="mt-1 block w-full border border-slate-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        </div>
                        <div>
                            <label for="message" class="block text-sm font-medium text-slate-700">Message</label>
                            <textarea name="message" id="message" rows="4" required class="mt-1 block w-full border border-slate-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"></textarea>
                        </div>
                        <div>
                            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                                Send Message
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
