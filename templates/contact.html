{% extends "base.html" %}

{% block content %}
<div class="relative py-20 overflow-hidden">
    <!-- Background Elements -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-0 right-1/4 w-96 h-96 bg-blue-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
        <div class="absolute bottom-0 left-1/4 w-96 h-96 bg-purple-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-16">
            <h2 class="text-4xl font-extrabold tracking-tight text-slate-900 dark:text-white sm:text-5xl mb-4">
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600 dark:from-indigo-400 dark:to-purple-400">Get in Touch</span>
            </h2>
            <p class="mt-4 max-w-2xl text-xl text-slate-600 dark:text-slate-300 mx-auto">
                We'd love to hear from you. Reach out to us for any queries or assistance.
            </p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <!-- Contact Info & Map -->
            <div class="space-y-8">
                <div class="glass-card p-8 transform transition hover:scale-[1.02]">
                    <h3 class="text-2xl font-bold text-slate-900 dark:text-white mb-6">Contact Information</h3>
                    <div class="space-y-6">
                        <div class="flex items-start">
                            <div class="flex-shrink-0 bg-indigo-100 dark:bg-indigo-900/50 rounded-lg p-3">
                                <i class="fas fa-map-marker-alt text-indigo-600 dark:text-indigo-400 text-xl"></i>
                            </div>
                            <div class="ml-4">
                                <p class="text-sm font-medium text-slate-900 dark:text-white">Address</p>
                                <p class="text-slate-600 dark:text-slate-300">{{ college_info.address }}</p>
                            </div>
                        </div>
                        <div class="flex items-start">
                            <div class="flex-shrink-0 bg-indigo-100 dark:bg-indigo-900/50 rounded-lg p-3">
                                <i class="fas fa-phone text-indigo-600 dark:text-indigo-400 text-xl"></i>
                            </div>
                            <div class="ml-4">
                                <p class="text-sm font-medium text-slate-900 dark:text-white">Phone</p>
                                <p class="text-slate-600 dark:text-slate-300">{{ college_info.phone }}</p>
                            </div>
                        </div>
                        <div class="flex items-start">
                            <div class="flex-shrink-0 bg-indigo-100 dark:bg-indigo-900/50 rounded-lg p-3">
                                <i class="fas fa-envelope text-indigo-600 dark:text-indigo-400 text-xl"></i>
                            </div>
                            <div class="ml-4">
                                <p class="text-sm font-medium text-slate-900 dark:text-white">Email</p>
                                <p class="text-slate-600 dark:text-slate-300">{{ college_info.email }}</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="glass-card p-2 h-80 transform transition hover:scale-[1.02] overflow-hidden">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3801.5988826823677!2d75.92081737593257!3d17.669173194675!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc5db55d5555555%3A0x7777777777777777!2sBrahmdevdada%20Mane%20Institute%20of%20Technology!5e0!3m2!1sen!2sin!4v1733295000000!5m2!1sen!2sin" 
                        width="100%" 
                        height="100%" 
                        style="border:0; border-radius: 0.75rem;" 
                        allowfullscreen="" 
                        loading="lazy" 
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="glass-card p-8">
                <h3 class="text-2xl font-bold text-slate-900 dark:text-white mb-6">Send us a message</h3>
                <form action="{{ url_for('contact') }}" method="POST" class="space-y-6">
                    <div>
                        <label for="name" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Name</label>
                        <input type="text" name="name" id="name" required class="mt-1 block w-full bg-white/50 dark:bg-slate-800/50 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm py-3 px-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-slate-900 dark:text-white placeholder-slate-400">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Email</label>
                        <input type="email" name="email" id="email" required class="mt-1 block w-full bg-white/50 dark:bg-slate-800/50 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm py-3 px-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-slate-900 dark:text-white placeholder-slate-400">
                    </div>
                    <div>
                        <label for="phone" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Phone</label>
                        <input type="tel" name="phone" id="phone" class="mt-1 block w-full bg-white/50 dark:bg-slate-800/50 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm py-3 px-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-slate-900 dark:text-white placeholder-slate-400">
                    </div>
                    <div>
                        <label for="subject" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Subject</label>
                        <input type="text" name="subject" id="subject" required class="mt-1 block w-full bg-white/50 dark:bg-slate-800/50 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm py-3 px-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-slate-900 dark:text-white placeholder-slate-400">
                    </div>
                    <div>
                        <label for="message" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Message</label>
                        <textarea name="message" id="message" rows="4" required class="mt-1 block w-full bg-white/50 dark:bg-slate-800/50 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm py-3 px-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-slate-900 dark:text-white placeholder-slate-400"></textarea>
                    </div>
                    <div>
                        <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-lg text-sm font-bold text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transform transition hover:scale-[1.02]">
                            Send Message
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .animate-blob {
        animation: blob 7s infinite;
    }
    .animation-delay-2000 {
        animation-delay: 2s;
    }
    @keyframes blob {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
        100% { transform: translate(0px, 0px) scale(1); }
    }
</style>
{% endblock %}
